            background-color: #f8fafc;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

            background: #cbd5e1;
            border-radius: 10px;
        }

        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
